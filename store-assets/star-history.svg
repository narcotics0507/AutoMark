<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" role="img" aria-labelledby="title desc">
  <title id="title">AutoMark Star History</title>
  <desc id="desc">AutoMark grew from 1 GitHub star on February 10, 2026 to 62 stars on July 15, 2026.</desc>
  <defs>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f81f7" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#2f81f7" stop-opacity="0.03"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1f2328" flood-opacity="0.08"/>
    </filter>
    <style>
      .background { fill: #ffffff; stroke: #d0d7de; }
      .grid { stroke: #d8dee4; stroke-width: 1; }
      .axis-label { fill: #57606a; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .heading { fill: #1f2328; font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .subtitle { fill: #656d76; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .value { fill: #0969da; font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .line { fill: none; stroke: #2f81f7; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      @media (prefers-color-scheme: dark) {
        .background { fill: #0d1117; stroke: #30363d; }
        .grid { stroke: #30363d; }
        .axis-label, .subtitle { fill: #8b949e; }
        .heading { fill: #f0f6fc; }
        .value { fill: #58a6ff; }
        .line { stroke: #58a6ff; }
      }
    </style>
  </defs>

  <rect class="background" x="8" y="8" width="944" height="464" rx="12" filter="url(#shadow)"/>
  <text class="heading" x="80" y="38">AutoMark Star History</text>
  <text class="subtitle" x="80" y="57">GitHub stars over time</text>
  <text class="value" x="920" y="42" text-anchor="end">62 Stars</text>

